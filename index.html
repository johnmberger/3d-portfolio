<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John's Studio.</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Source+Sans+3:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <canvas id="webgl"></canvas>
      <header class="hud">
        <p class="brand">John's Studio.</p>
        <p class="hint">Drag to look · Scroll to zoom · Click monitor, turntable, bathroom, or credits</p>
      </header>
      <div class="hud-actions">
        <a class="resume-link" href="https://johnmberger.com/resume/" target="_blank" rel="noreferrer">Resume</a>
      </div>
      <button class="exit-screen" type="button" hidden>Back to room</button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
