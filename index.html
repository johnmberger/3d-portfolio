<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>John Berger</title>
    <!-- Critical first-paint styles — avoid FOUC before the module CSS arrives -->
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #d4c4b0;
      }
      #app {
        opacity: 0;
      }
      body.is-app-ready #app {
        opacity: 1;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        z-index: 20;
        display: grid;
        place-items: center;
        margin: 0;
        background:
          radial-gradient(ellipse 80% 55% at 50% 0%, #ead8c0 0%, transparent 55%),
          radial-gradient(ellipse 70% 50% at 85% 100%, #c9a88255 0%, transparent 50%),
          linear-gradient(165deg, #d8c8b4 0%, #c4b09a 100%);
        color: #1c2420;
        font-family: Georgia, "Times New Roman", serif;
      }
      .loading-screen__inner {
        text-align: center;
        padding: 2rem;
        max-width: 22rem;
      }
      .loading-screen__eyebrow {
        margin: 0 0 1rem;
        font-family: system-ui, sans-serif;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(28, 36, 32, 0.45);
      }
      .loading-screen__brand {
        margin: 0;
        font-family: "Fraunces", Georgia, "Times New Roman", serif;
        font-weight: 600;
        font-size: clamp(2.6rem, 8vw, 4.25rem);
        letter-spacing: -0.035em;
        line-height: 0.95;
      }
      .loading-screen__status {
        margin: 1.1rem 0 0;
        font-family: system-ui, sans-serif;
        font-size: 0.92rem;
        color: rgba(28, 36, 32, 0.5);
        letter-spacing: 0.01em;
      }
      .loading-screen__bar {
        width: min(10rem, 42vw);
        height: 1.5px;
        margin: 1.75rem auto 0;
        background: rgba(28, 36, 32, 0.14);
        overflow: hidden;
      }
      .loading-screen__bar-fill {
        display: block;
        width: 100%;
        height: 100%;
        background: #1c2420;
        transform: scaleX(0.08);
        transform-origin: left center;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://johnmberger.com" crossorigin />
    <link rel="prefetch" href="https://johnmberger.com/resume/" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Source+Sans+3:wght@400;500&display=optional"
      rel="stylesheet"
    />
  </head>
  <body>
    <div
      class="loading-screen"
      id="loading-screen"
      role="status"
      aria-live="polite"
    >
      <div class="loading-screen__inner">
        <p class="loading-screen__eyebrow">Make yourself at home</p>
        <p class="loading-screen__brand">John's Studio</p>
        <p class="loading-screen__status">Opening the door…</p>
        <div class="loading-screen__bar" aria-hidden="true">
          <span class="loading-screen__bar-fill"></span>
        </div>
      </div>
    </div>
    <div id="app">
      <canvas id="webgl"></canvas>
      <header class="hud">
        <p class="brand">John's Studio</p>
        <p class="hint">Drag to look · Scroll to zoom</p>
      </header>
      <div class="hud-actions">
        <a
          class="resume-link"
          href="https://johnmberger.com/resume/"
          target="_blank"
          rel="noreferrer"
          >Resume</a
        >
      </div>
      <button class="focus-close focus-close--hud" type="button" aria-label="Back to room" hidden>
        ✕
      </button>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
